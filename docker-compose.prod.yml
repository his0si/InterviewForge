# interviewforge.kro.kr 프로덕션 컨테이너.
# 다른 사이트와 겹치지 않도록 전용 프로젝트명/컨테이너명/포트를 사용한다.
#  - 호스트 포트 8110 은 127.0.0.1 에만 바인딩 → 외부 노출은 호스트 nginx(443)만 담당
#  - 기존 사용 포트(8080 portfolio / 8090 comfit / 8100 web)와 겹치지 않음
name: interviewforge

services:
  web:
    build: .
    container_name: interviewforge
    restart: unless-stopped
    # 컨테이너에서 호스트의 interviewforge Postgres 클러스터(5434)에 닿기 위한 통로.
    # DATABASE_URL 의 host.docker.internal 이 호스트 게이트웨이(172.17.0.1)로 해석된다.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # docker compose 가 같은 폴더의 .env 를 읽어 ${...} 를 채운다.
    environment:
      - NODE_ENV=production
      - PORT=8787
      - APP_URL=${APP_URL}
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      # 로컬 LLM(Ollama) — 컨테이너에서 호스트(host.docker.internal:11434)로
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-exaone3.5:latest}
      - OLLAMA_EMBED_MODEL=${OLLAMA_EMBED_MODEL:-bge-m3:latest}
    ports:
      - "127.0.0.1:8110:8787"
