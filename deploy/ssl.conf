# 최종 HTTPS 설정. interviewforge.kro.kr 요청을 컨테이너(127.0.0.1:8110)로 프록시.
# 인증서는 acme.sh(ZeroSSL)가 /etc/nginx/ssl/interviewforge.kro.kr/ 에 설치/갱신한다.
upstream interviewforge_backend {
    server 127.0.0.1:8110;
}

# HTTP -> HTTPS 리다이렉트 (+ 인증서 갱신 챌린지 유지)
server {
    listen 80;
    listen [::]:80;
    server_name interviewforge.kro.kr;

    location /.well-known/acme-challenge/ {
        root /var/www/acme-challenge-interviewforge;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name interviewforge.kro.kr;

    ssl_certificate     /etc/nginx/ssl/interviewforge.kro.kr/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/interviewforge.kro.kr/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # 면접 녹화 영상 업로드 허용 용량(서버의 200MB 한도와 맞춤).
    # 없으면 nginx 기본값 1MB 라 영상 업로드가 413(HTML)로 거부된다.
    client_max_body_size 200M;

    location / {
        proxy_pass http://interviewforge_backend;
        # 큰 영상 업로드가 끊기지 않도록 프록시 타임아웃을 넉넉히.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_request_buffering off;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
