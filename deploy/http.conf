# 인증서 발급 전 임시 HTTP 설정. acme.sh 챌린지만 받고 나머지는 https 로 보낸다.
# 챌린지 webroot 는 다른 사이트와 공유하지 않는 전용 경로를 쓴다.
server {
    listen 80;
    listen [::]:80;
    server_name interviewforge.kro.kr;

    location /.well-known/acme-challenge/ {
        root /var/www/acme-challenge-interviewforge;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
